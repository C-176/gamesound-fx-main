<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GameSound FX - 游戏音效助手</title>
    <style>
      /* ─── Loading screen ─── */
      #loading-screen {
        position: fixed; inset: 0;
        background: #070312;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 999999;
        transition: opacity 0.4s ease;
      }
      #loading-screen.fade-out {
        opacity: 0;
        pointer-events: none;
      }
      /* Pixel character walk cycle */
      @keyframes pixel-walk {
        0%, 100% { transform: translateY(0); }
        25% { transform: translateY(-4px) translateX(-1px); }
        75% { transform: translateY(-4px) translateX(1px); }
      }
      @keyframes leg-swing {
        0%, 100% { transform: rotate(0deg); }
        25% { transform: rotate(8deg); }
        75% { transform: rotate(-8deg); }
      }
      /* Loading dots */
      @keyframes dot-pulse {
        0%, 100% { opacity: 0.2; }
        50% { opacity: 1; }
      }
      .load-dot:nth-child(1) { animation: dot-pulse 1.2s 0s infinite; }
      .load-dot:nth-child(2) { animation: dot-pulse 1.2s 0.3s infinite; }
      .load-dot:nth-child(3) { animation: dot-pulse 1.2s 0.6s infinite; }
      /* Scanning line */
      @keyframes scan-line {
        0% { top: 0; opacity: 1; }
        100% { top: 100%; opacity: 0; }
      }
      .loading-scan {
        position: absolute; left: 0; right: 0; height: 2px;
        background: #00eeff;
        box-shadow: 0 0 12px rgba(0, 238, 255, 0.6);
        animation: scan-line 1.5s linear infinite;
        pointer-events: none;
      }
      @media (prefers-reduced-motion: reduce) {
        #loading-screen *, .loading-scan { animation: none !important; }
      }
    </style>
  </head>
  <body>
    <div id="loading-screen">
      <div class="loading-scan"></div>
      <!-- Pixel adventurer (16x16) -->
      <svg width="64" height="64" viewBox="0 0 16 16" shapeRendering="crispEdges" style="animation: pixel-walk 0.6s steps(2) infinite;">
        <!-- Cap -->
        <rect x="4" y="1" width="8" height="1" fill="#00eeff"/>
        <rect x="3" y="2" width="10" height="2" fill="#00eeff"/>
        <!-- Face -->
        <rect x="4" y="4" width="8" height="3" fill="#ffd6a8"/>
        <!-- Eyes -->
        <rect x="5" y="5" width="1" height="1" fill="#0d0a1a"/>
        <rect x="10" y="5" width="1" height="1" fill="#0d0a1a"/>
        <!-- Mouth -->
        <rect x="7" y="6" width="2" height="1" fill="#ff2ea0"/>
        <!-- Neck -->
        <rect x="6" y="7" width="4" height="1" fill="#ffd6a8"/>
        <!-- Body -->
        <rect x="4" y="8" width="8" height="4" fill="#a371f7"/>
        <rect x="5" y="8" width="6" height="1" fill="#ff2ea0"/>
        <!-- Arms -->
        <rect x="2" y="8" width="2" height="4" fill="#a371f7"/>
        <rect x="12" y="8" width="2" height="4" fill="#a371f7"/>
        <!-- Legs -->
        <rect x="4" y="12" width="3" height="3" fill="#342a55"/>
        <rect x="9" y="12" width="3" height="3" fill="#342a55"/>
        <!-- Boots -->
        <rect x="3" y="14" width="4" height="2" fill="#ff4466"/>
        <rect x="9" y="14" width="4" height="2" fill="#ff4466"/>
        <!-- Boot dots -->
        <rect x="4" y="15" width="2" height="1" fill="#0d0a1a"/>
        <rect x="10" y="15" width="2" height="1" fill="#0d0a1a"/>
      </svg>
      <div style="font-family:'VonwaonBitmap',monospace;font-size:14px;color:#ff2ea0;margin-top:16px;letter-spacing:2px;">
        加载中<span class="load-dot">.</span><span class="load-dot">.</span><span class="load-dot">.</span>
      </div>
      <div style="font-family:'VonwaonBitmap',monospace;font-size:10px;color:#9a90c8;margin-top:16px;opacity:0.6;">
        GAMESOUND FX
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
