<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: transparent;
    font-family: 'VonwaonBitmap', 'Consolas', 'Courier New', monospace;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    letter-spacing: 1px;
  }

  #now-playing {
    position: fixed;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    transition: opacity 0.25s ease-out;
    opacity: 0;
    padding-left: 0;
  }
  #now-playing.active { opacity: 1; }

  .np-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(10, 6, 26, 0.75);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    padding: 10px 16px 10px 12px;
    border: 1px solid rgba(255, 122, 200, 0.25);
    border-left: 3px solid #ff7ac8;
    border-radius: 0 10px 10px 0;
    box-shadow: 4px 0 20px rgba(255, 122, 200, 0.1);
  }

  .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 18px; }
  .eq-bar { width: 3px; border-radius: 1px; background: #ff7ac8; min-height: 4px; }

  .np-name {
    color: #f0e6ff;
    font-size: 13px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 150px;
    letter-spacing: 0.5px;
    font-weight: 500;
  }

  #picker {
    position: fixed;
    bottom: 62px;
    left: 12px;
    z-index: 100;
    border: 2px solid #ff2ea0;
    background: #0f0920;
    padding: 12px;
    min-width: 260px;
    max-width: 340px;
    box-shadow: 3px 0 0 rgba(255, 46, 160, 0.2);
    animation: slide-up 0.2s steps(4);
  }

  .picker-title {
    color: #ff2ea0;
    font-size: 12px;
    letter-spacing: 2px;
    margin-bottom: 8px;
  }

  .picker-choice {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 8px;
    border: 2px solid #28204a;
    background: #171030;
    margin-bottom: 4px;
  }

  .picker-num {
    color: #ff2ea0;
    font-size: 12px;
    width: 20px;
    letter-spacing: 0;
  }

  .picker-name {
    color: #e8e6ff;
    font-size: 12px;
    letter-spacing: 1px;
  }

  .picker-hint {
    color: #7b72b8;
    font-size: 10px;
    margin-top: 8px;
    text-align: center;
    letter-spacing: 1px;
  }

  @keyframes slide-up {
    0% { opacity: 0; transform: translateY(12px); }
    100% { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
  <div id="now-playing">
    <div class="np-box">
      <div class="eq-bars">
        <div class="eq-bar" style="height:100%;animation:b1 .6s ease-in-out infinite"></div>
        <div class="eq-bar" style="height:100%;animation:b2 .5s ease-in-out infinite"></div>
        <div class="eq-bar" style="height:100%;animation:b3 .7s ease-in-out infinite"></div>
        <div class="eq-bar" style="height:100%;animation:b4 .55s ease-in-out infinite"></div>
      </div>
      <span class="np-name" id="np-name"></span>
    </div>
  </div>

  <div id="picker" style="display:none;">
    <div class="picker-title" id="picker-title"></div>
    <div id="picker-choices"></div>
    <div class="picker-hint" id="picker-hint">` + 1/2/3 选择</div>
  </div>

  <script>
    (function(){
      var s = document.createElement('style');
      s.textContent = [
        '@keyframes b1{0%,100%{transform:scaleY(.3)}50%{transform:scaleY(1)}}',
        '@keyframes b2{0%,100%{transform:scaleY(.5)}50%{transform:scaleY(.8)}}',
        '@keyframes b3{0%,100%{transform:scaleY(.2)}50%{transform:scaleY(1)}}',
        '@keyframes b4{0%,100%{transform:scaleY(.6)}50%{transform:scaleY(.9)}}',
      ].join('\n');
      document.head.appendChild(s);

      var electron = window.electron;
      if (!electron || !electron.ipcRenderer) return;

      var hideTimer = null;

      electron.ipcRenderer.on('now-playing-changed', function(_, soundName) {
        var el = document.getElementById('now-playing');
        var nameEl = document.getElementById('np-name');
        if (soundName) {
          nameEl.textContent = soundName;
          el.classList.add('active');
          if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
        } else {
          hideTimer = setTimeout(function() {
            el.classList.remove('active');
            hideTimer = null;
          }, 500);
        }
      });

      function renderPicker(choices, eventLabel) {
        var titleEl = document.getElementById('picker-title');
        var choicesEl = document.getElementById('picker-choices');
        if (!titleEl || !choicesEl) return;
        titleEl.textContent = (eventLabel || 'SELECT SOUND');
        choicesEl.innerHTML = '';
        for (var i = 0; i < choices.length; i++) {
          var div = document.createElement('div');
          div.className = 'picker-choice';
          var num = document.createElement('span');
          num.className = 'picker-num';
          num.textContent = (i + 1) + '.';
          var name = document.createElement('span');
          name.className = 'picker-name';
          name.textContent = choices[i].name || choices[i].id || '???';
          div.appendChild(num);
          div.appendChild(name);
          choicesEl.appendChild(div);
        }
      }

      function updatePickerHint(prefixKeyName) {
        var hint = document.getElementById('picker-hint');
        if (hint) hint.textContent = (prefixKeyName || '`') + ' + 1/2/3 选择';
      }

      electron.ipcRenderer.on('valorant-picker-show', function(_, data) {
        var picker = document.getElementById('picker');
        if (!picker) return;
        renderPicker(data.choices, data.eventLabel);
        updatePickerHint(data.prefixKeyName);
        picker.style.display = 'block';
      });

      electron.ipcRenderer.on('valorant-picker-update', function(_, data) {
        renderPicker(data.choices, data.eventLabel);
        if (data.prefixKeyName) updatePickerHint(data.prefixKeyName);
      });

      electron.ipcRenderer.on('valorant-picker-hide', function() {
        var picker = document.getElementById('picker');
        if (picker) picker.style.display = 'none';
      });
    })();
  </script>
</body>
</html>
